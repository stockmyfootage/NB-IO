<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>narrabrain.io | alpha console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nv-bg-canvas: #121214;
            --nv-bg-surface: #1E1F22;
            --nv-text-primary: #E3E5E8;
            --nv-text-muted: #949BA4;
        }
        body { background-color: var(--nv-bg-canvas); color: var(--nv-text-primary); font-family: system-ui, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
    
    <script>
        (function() {
            const token = sessionStorage.getItem('alpha_session_token');
            if (!token) {
                window.location.replace('/alpha');
                return;
            }
            
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(window.atob(base64));
                
                const currentUnixTimestamp = Math.floor(Date.now() / 1000);
                if (payload.exp && currentUnixTimestamp >= payload.exp) {
                    alert("Alpha tester session frame expired.");
                    sessionStorage.removeItem('alpha_session_token');
                    window.location.replace('/alpha');
                }
            } catch (e) {
                sessionStorage.removeItem('alpha_session_token');
                window.location.replace('/alpha');
            }
        })();
    </script>
</head>
<body class="p-8 md:p-12">
 <nav class="fixed top-0 w-full z-50 px-6 md:px-12 py-6 flex justify-between items-center backdrop-blur-md border-b elevation-1" style="border-color: rgba(255, 255, 255, 0.08); background: rgba(18, 18, 20, 0.8);">
        <a href="/" class="brand-text text-lg" style="letter-spacing: -0.05em; text-decoration: none;">narrabrain.io</a>
        <a href="/" class="glass-card px-5 py-2 rounded-full mono text-xs tracking-widest font-bold transition-all duration-300 hover:text-white" style="color: var(--nv-accent-brand); text-decoration: none;">
            ← back to site
        </a>
    </nav>
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-16 pb-6 border-b border-white/5">
        <div class="text-lg lowercase font-medium tracking-tighter text-white">narrabrain.io <span class="text-xs text-cyan-400 font-mono ml-2">[alpha1.1]</span></div>
        <button onclick="terminateSession()" class="text-xs tracking-widest uppercase border border-white/10 hover:border-red-500/40 hover:text-red-400 px-4 py-2 rounded-full transition-all">
            Terminate Session
        </button>
    </header>

    <main class="max-w-6xl mx-auto">
        <div class="glass-card p-10 md:p-14 rounded-[32px] mb-8">
            <h1 class="text-3xl text-white font-serif italic mb-2">Synthesis Testing Matrix</h1>
            <p class="text-sm mb-8" style="color: var(--nv-text-muted);">Direct secure node connection active.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-black/30 p-6 rounded-2xl border border-white/5">
                    <p class="text-xs tracking-wider uppercase text-zinc-500 mb-1">Directorial Core</p>
                    <p class="text-lg font-medium text-emerald-400">Online / Standby</p>
                </div>
                <div class="bg-black/30 p-6 rounded-2xl border border-white/5">
                    <p class="text-xs tracking-wider uppercase text-zinc-500 mb-1">Temporal Graph</p>
                    <p class="text-lg font-medium text-cyan-400">Active Node</p>
                </div>
                <div class="bg-black/30 p-6 rounded-2xl border border-white/5">
                    <p class="text-xs tracking-wider uppercase text-zinc-500 mb-1">Alpha Progress</p>
                    <p class="text-lg font-medium text-zinc-400">Authenticated</p>
                </div>
            </div>
        </div>
    </main>
<footer class="p-12 md:p-16 border-t glass-card rounded-none elevation-1 w-full" style="border-color: rgba(255, 255, 255, 0.08); background: rgba(18, 18, 20, 0.4);">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
            <p class="mono text-xs uppercase tracking-widest" style="color: var(--nv-accent-brand); margin: 0;">© 2026, Narrabrain Labs Pvt Ltd</p>
            
            <div class="flex flex-wrap justify-center gap-8 mono text-xs uppercase tracking-widest">
                <a href="mailto:hello@narrabrain.io" class="transition-colors duration-300" style="color: var(--nv-text-muted); text-decoration: none; letter-spacing: 0.1em;">hello@narrabrain.io</a>
                <a href="/privacy" class="transition-colors duration-300" style="color: var(--nv-text-muted); text-decoration: none; letter-spacing: 0.05em;">Privacy</a>
                <a href="/terms" class="transition-colors duration-300" style="color: var(--nv-text-muted); text-decoration: none; letter-spacing: 0.05em;">Terms</a>
            </div>
        </div>
    </footer>
    <script>
        function terminateSession() {
            sessionStorage.removeItem('alpha_session_token');
            window.location.href = '/alpha';
        }
    </script>
    
</body>
</html>

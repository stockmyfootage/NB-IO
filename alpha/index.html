<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>narrabrain.io | alpha gate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --nv-bg-canvas: #121214;
            --nv-bg-surface: #1E1F22;
            --nv-text-primary: #E3E5E8;
            --nv-text-muted: #949BA4;
        }
        body { background-color: var(--nv-bg-canvas); color: var(--nv-text-primary); font-family: system-ui, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-6">

    <div class="w-full max-w-md glass-card p-10 rounded-[32px] text-center">
        <span class="text-[10px] uppercase tracking-[0.2em] block mb-4 text-cyan-400 font-mono">Environment Verification</span>
        <h2 class="text-white text-3xl font-medium mb-8 tracking-tight font-serif italic">Alpha Sandbox Gate</h2>
        
        <form id="gate-form" class="space-y-6">
            <input type="password" id="passkey-input" placeholder="enter environment passkey" required 
                   class="w-full border rounded-2xl p-5 text-sm text-white focus:border-cyan-500 bg-black/40 border-zinc-800 outline-none text-center">
            
            <div id="error-msg" class="text-xs text-red-400 hidden italic"></div>
            
            <button type="submit" id="submit-btn" class="w-full bg-white text-black py-5 rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-cyan-400 transition-all">
                Validate Identity
            </button>
        </form>
    </div>
<script>
    const API_URL = 'https://4co4fs4xn5.execute-api.eu-north-1.amazonaws.com/validate';

    document.getElementById('gate-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const passkey = document.getElementById('passkey-input').value;
        const errorMsg = document.getElementById('error-msg');
        const submitBtn = document.getElementById('submit-btn');

        errorMsg.classList.add('hidden');
        submitBtn.innerText = "VERIFYING...";
        submitBtn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ passkey: passkey })
            });

            let data = {};
            
            // Parse response body
            try {
                const textData = await response.text();
                console.log('Response status:', response.status);
                console.log('Response body:', textData); // Debug log
                
                if (textData) {
                    data = JSON.parse(textData);
                }
            } catch (parseErr) {
                throw new Error(`Failed to parse server response: ${parseErr.message}`);
            }

            // Check if request was successful
            if (!response.ok) {
                throw new Error(data.error || `Server returned ${response.status}`);
            }

            // Store token and redirect
            if (!data.token) {
                throw new Error('No token received from server');
            }
            
            sessionStorage.setItem('alpha_session_token', data.token);
            window.location.href = '/alpha-dashboard';

        } catch (err) {
            console.error('Auth error:', err); // Debug log
            errorMsg.innerText = err.message || 'Verification failed. Check console for details.';
            errorMsg.classList.remove('hidden');
            submitBtn.innerText = "VALIDATE IDENTITY";
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
